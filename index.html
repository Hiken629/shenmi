<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾尔登法环 | ELDEN RING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body {
            background-color: #050505;
            color: #dcdcdc;
            font-family: "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            touch-action: pan-y;
        }
        html {
            /* scroll-snap-type: y mandatory; */
            /* scroll-behavior: smooth; */
        }
        .epic-font {
            font-family: 'Cinzel', serif;
        }
        .hero-section {
            position: relative;
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            /* scroll-snap-align: start; */
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            z-index: -2;
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        .hero-title {
            color: #D4AF37; 
            font-size: 5rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); 
            letter-spacing: 10px;
            margin-bottom: 20px;
        }

        .character-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, #050505, #111, #050505);
            /* scroll-snap-align: start;  */
        }

        .char-card {
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: all 0.4s ease; 
        }

        .char-card img {
            width: 100%;
            aspect-ratio: 3 / 4; 
            object-fit: cover;
            filter: grayscale(30%) brightness(0.9);
            transition: all 0.4s ease;
        }

        .char-name {
            text-align: center;
            padding: 15px 10px;
            color: #aaa;
            font-size: clamp(1rem, 1.5vw, 1.5rem); 
            word-break: keep-all;
            transition: all 0.4s ease;
        }

        .char-card:hover {
            transform: scale(1.05) translateY(-10px); 
            border-color: #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); 
        }

        .char-card:hover img {
            filter: grayscale(0%) brightness(1.1); 
        }

        .char-card:hover .char-name {
            color: #D4AF37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        .lore-link {
            display: inline-block; 
            color: rgba(255, 255, 255, 0.6); 
            font-size: 1.25rem;
            letter-spacing: 2px;
            text-decoration: none; 
            transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            cursor: pointer;
            margin-top: 20px;
        }

        .lore-link:hover {
            transform: scale(1.03); 
            color: #ffffff; 
            letter-spacing: 3px; 
            text-shadow: 
                0 0 10px #D4AF37,
                0 0 20px #D4AF37,
                0 0 40px rgba(212, 175, 55, 0.8); 
        }

        #bgm-toggle {
            position: fixed;
            bottom: 40px;
            right: 50px;
            color: #777; 
            font-size: 1rem;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.5s ease;
            user-select: none;
        }

        #bgm-toggle:hover {
            color: #ccc;
        }

        #bgm-toggle.playing {
            color: #D4AF37;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            animation: textBreathe 3s infinite alternate;
        }

        @keyframes textBreathe {
            0% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
            100% { text-shadow: 0 0 25px rgba(212, 175, 55, 0.9); }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="video-overlay"></div>
        <video class="hero-video" autoplay loop muted playsinline>
            <source src="jiemian1.mp4">
        </video>

        <div class="container position-relative z-1">
            <h1 class="hero-title epic-font">ELDEN RING</h1>
            <a href="jiaojiedi.html" class="lore-link">落叶捎来讯息，在雾的彼端，我们的故乡交界地...</a>
        </div>
    </section>

    <section class="character-section" id="characters">
        <div class="container">
            <h2 class="text-center epic-font mb-5" style="color: #D4AF37;">Demigod</h2>
            <div class="row g-4">
                
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="0">
                    <a href="nvwushen.html" class="char-card">
                        <img src="malianniya.jpg" alt="Vagabond">
                        <div class="char-name epic-font">Malenia (玛莲妮亚)</div>
                    </a>
                </div>

                <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
                    <a href="gangzi.html" class="char-card">
                        <img src="ladagang.jpg" alt="Samurai">
                        <div class="char-name epic-font">Radagon (拉达冈)</div>
                    </a>
                </div>

                <div class="col-md-4" data-aos="fade-up" data-aos-delay="400">
                    <a href="suixin.html" class="char-card">
                        <img src="lataen.jpeg" alt="Astrologer">
                        <div class="char-name epic-font">Radahn (拉塔恩)</div>
                    </a>
                </div>

            </div>
        </div>
    </section>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000, 
            once: false      
        });

        let isScrolling = false; 
        const sections = document.querySelectorAll('section'); 
        let currentSectionIndex = 0; 

        if (window.location.hash === '#characters') {
            currentSectionIndex = 1;
            window.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('section');
            
            if (window.location.hash === '#characters') {
                const targetSection = sections[1];
                if (targetSection) {
                const htmlElement = document.documentElement;

                htmlElement.style.scrollBehavior = 'auto';

                window.scrollTo({
                    top: targetSection.offsetTop,
                    behavior: 'auto'
                });


                setTimeout(() => {
                    htmlElement.style.scrollBehavior = 'smooth';
                }, 0);
                }
            }
            });
        }
        window.addEventListener('wheel', (e) => {
            e.preventDefault(); 
            if (isScrolling) return; 

            if (e.deltaY > 0) {
                if (currentSectionIndex < sections.length - 1) currentSectionIndex++;
            } else {
                if (currentSectionIndex > 0) currentSectionIndex--;
            }

            scrollToSection(currentSectionIndex);
        }, { passive: false }); 


        function scrollToSection(index) {
            isScrolling = true;
            const targetPosition = sections[index].offsetTop;
            const startPosition = window.pageYOffset;        
            const distance = targetPosition - startPosition;  
            const duration = 120;
            let startTime = null;


            function easeInOutQuad(t, b, c, d) {
                t /= d / 2;
                if (t < 1) return c / 2 * t * t + b;
                t--;
                return -c / 2 * (t * (t - 2) - 1) + b;
            }

            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const run = easeInOutQuad(timeElapsed, startPosition, distance, duration);
                window.scrollTo(0, run);

                if (timeElapsed < duration) {
                    requestAnimationFrame(animation);
                } else {
                    window.scrollTo(0, targetPosition);
                    setTimeout(() => { isScrolling = false; }, 200); 
                }
            }

            requestAnimationFrame(animation);
        }


        // ==========================================
        // 跨页面 BGM 记忆引擎 (Cross-page Audio Engine)
        // ==========================================
        document.addEventListener("DOMContentLoaded", function() {
            const bgm = document.getElementById('epic-bgm');
            const bgmToggle = document.getElementById('bgm-toggle');

            // 1. 网页加载时：读取上一个网页留下的存档
            const isPlaying = localStorage.getItem('bgm_playing') === 'true';
            const savedTime = localStorage.getItem('bgm_time') || 0;

            if (isPlaying) {
                // 如果上个网页正在播放，把时间快进到存档点
                bgm.currentTime = parseFloat(savedTime);
                
                // 跨页自动播放
                let playPromise = bgm.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        bgmToggle.innerText = 'ON';
                        bgmToggle.classList.add('playing');
                    }).catch(error => {
                        console.warn("浏览器拦截了自动播放，需用户再次点击");
                        bgmToggle.innerText = 'OFF';
                        localStorage.setItem('bgm_playing', 'false');
                    });
                }
            } else {
                bgmToggle.innerText = 'OFF';
            }

            // 2. 玩家点击开关时的逻辑
            bgmToggle.addEventListener('click', function() {
                if (bgm.paused) {
                    bgm.play();
                    bgmToggle.innerText = 'ON';
                    bgmToggle.classList.add('playing');
                    localStorage.setItem('bgm_playing', 'true'); // 记录状态：播放中
                } else {
                    bgm.pause();
                    bgmToggle.innerText = 'OFF';
                    bgmToggle.classList.remove('playing');
                    localStorage.setItem('bgm_playing', 'false'); // 记录状态：已暂停
                }
            });
            setInterval(() => {
                if (!bgm.paused) {
                    localStorage.setItem('bgm_time', bgm.currentTime);
                }
            }, 500);
        });
    </script>
    <audio id="epic-bgm" loop src="bgm.mp3"></audio>

    <div id="bgm-toggle" class="epic-font">OFF</div>
</body>
</html>
